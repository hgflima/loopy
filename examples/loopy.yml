version: "1"
name: agentic-loop

workspace:
  root: "."
  parent_branch: "main"
  worktrees_dir: ".worktrees"

# Registry de agentes nomeados (AD-3 evoluído — um Processo por Agente referenciado).
# Claude implementa (default) + Codex simplifica (effort: low) + OpenCode refina
# (mode: build) + Claude audita (mode: plan).
# mode/model/effort são o DIALETO LITERAL do agente — descubra com `loopy probe-agent <nome>`.
agents:
  # `preset` empresta o argv do Catálogo de Agentes (src/acp/catalog.ts): o
  # comando do adapter (e o pin de versão, quando importa) é conhecimento do
  # projeto, não escolha sua. Presets: claude, codex, opencode.
  claude:
    preset: claude
  codex:
    preset: codex
    # SEM env → auth por subscription (login ChatGPT via `codex login`; é o default).
    # Para API key opt-in, descomente:
    # env:
    #   CODEX_API_KEY: "${env.CODEX_API_KEY}"
    effort: low
  opencode:
    preset: opencode

  # Para um adapter fora do Catálogo, declare o argv na mão com `command:`.
  # `preset` e `command` são mutuamente exclusivos — um dos dois, nunca os dois.
  # meu-adapter:
  #   command: ["meu-acp-adapter", "--stdio"]

acp:
  default_agent: claude
  request_timeout_seconds: 1800
  permissions:
    default_mode: acceptEdits
    on_request: allow

inputs:
  spec: ".harn/devy/changes/C-0003-unify-on-fail/spec.md"
  plan: ".harn/devy/changes/C-0003-unify-on-fail/plan.md"
  todo: ".harn/devy/changes/C-0003-unify-on-fail/todo.md"
  backlog:
    pending_marker: "- [ ]"
    done_marker: "- [x]"
    task_id_pattern: "T-\\d+"
    body: indented
    mark_done_on_success: true
    deps_pattern: "Deps:"

checks:
  ci:
    - { name: typecheck, run: "npm run typecheck" }
    - { name: lint, run: "npm run lint" }
    - { name: test, run: "npm test" }

pipeline:
  - id: create-worktree
    type: shell
    run:
      - git worktree add -b "${task.branch}" "${worktree.path}" "${workspace.parent_branch}"

  - id: install-deps
    type: shell
    parallel_safe: true
    run:
      - npm ci --prefix "${worktree.path}"

  - id: implement
    type: agent
    clear_context: true
    mode: acceptEdits
    prompt: |
      /devy:build Implemente a task ${task.id} — ${task.title} — conforme ${inputs.spec} e ${inputs.plan}.
      ${task.body}
      ${checks.report}
      **CRITICAL**: NÃO rode git add/commit. Deixe todas as mudanças no working tree; o pipeline faz o commit.
    retry_prompt: |
      A tentativa anterior está no worktree, mas os checks falharam. Leia o código e corrija.
      ${checks.report}
    verify: { run: ci, max_attempts: 3 }

  - id: simplify
    type: agent
    agent: codex
    effort: low
    clear_context: true
    # Modo é vocabulário POR-AGENTE: codex-acp expõe read-only|agent|agent-full-access
    # (não os modos do claude, acceptEdits/plan). "agent" = ler/editar/rodar comandos.
    mode: agent
    prompt: |
      /devy:code-simplify Simplifique o que está no worktree sem alterar comportamento: remova
      duplicação, clareie nomes, reduza complexidade. Não adicione dependências.
      **CRITICAL**: NÃO rode git add/commit. Deixe todas as mudanças no working tree; o pipeline faz o commit.
      Diff atual:
      ${worktree.diff}
    verify: { run: ci, max_attempts: 3 }

  - id: enhance
    type: agent
    agent: opencode
    clear_context: true
    # opencode expõe build|plan (via `loopy probe-agent opencode`).
    # "build" = ler + editar + rodar comandos (análogo a acceptEdits do claude).
    mode: build
    prompt: |
      Revise os tipos e a documentação inline da task ${task.id}.
      Garanta que funções públicas tenham JSDoc e que types não usem `any`.
      **CRITICAL**: NÃO rode git add/commit. Deixe todas as mudanças no working tree; o pipeline faz o commit.
      Diff atual:
      ${worktree.diff}
    verify: { run: ci, max_attempts: 2 }

  - id: review
    type: agent
    clear_context: true
    mode: plan
    prompt: |
      /devy:review Reveja a implementação da task ${task.id} contra ${inputs.spec} e ${inputs.plan}
      **CRITICAL:** NUNCA EDITE NADA!
      Diff sob revisão:
      ${worktree.diff}
      Respond a na ÚLTIMA linha exatamente "REVIEW: PASS" ou "REVIEW: FAIL: <motivo>".
    expect: "REVIEW: PASS"
    on_fail: { goto: implement }

  - id: commit
    type: shell
    run:
      - git -C "${worktree.path}" add -A
      - 'git -C "${worktree.path}" commit --allow-empty -m "feat(${task.id}): ${task.title}"'

  - id: merge
    type: approval
    prompt: "Aprovar merge da task ${task.id} (${task.title}) em ${workspace.parent_branch}?"
    run:
      - 'git -C "${workspace.root}" merge --no-ff "${task.branch}" -m "merge(${task.id}): ${task.title}"'
    on_fail: escalate

  - id: cleanup
    type: shell
    always: true
    run:
      - git -C "${workspace.root}" worktree remove --force "${worktree.path}"
      - git -C "${workspace.root}" branch -D "${task.branch}"

stop_conditions:
  max_iterations: 25
  max_step_visits: 10
  stop_signal_file: ".loopy.stop"

# concurrency: auto   # "auto" = min(maxLayerWidth, max_concurrency); default 1 (sequencial)
# max_concurrency: 4  # teto do auto (default 4); NÃO limita concurrency numérico explícito

policies:
  escalation:
    action: pause
    keep_worktree: true
    notify: stderr
  git:
    require_clean_parent: true
    on_merge_conflict: escalate   # escalate (default) | rebase (auto-rebase + retry-once dentro do mutex)

logging:
  dir: ".loopy/logs"
  per_task: true
  capture_acp_traffic: true

# Opt-in metrics collection (C-0005). Absence = feature off (zero regression).
# When present, the engine collects per-step timing + ACP tokens (best-effort).
metrics:
  report:
    index: "${change.dir}/../index.md"   # where the Change report is persisted
