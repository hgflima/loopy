[package]
name = "loopy-menubar"
version = "0.1.0"
edition = "2021"

# `tauri-nspanel`'s `panel_delegate!` (src/panel.rs) expands the `objc` crate's
# `sel_impl!`/`class!` macros, which emit `#[cfg(feature = "cargo-clippy")]` —
# a legacy clippy-detection guard. Because the cfg is generated by an external
# macro, the `unexpected_cfgs` lint is resolved against THIS crate's global
# check-cfg list (not objc's), so an inline `#![allow(unexpected_cfgs)]` at the
# expansion site can't suppress it. Declaring the value as expected here silences
# exactly that one cfg while keeping the lint's protection for real feature typos
# (`feature` values are unioned with the set Cargo derives from `[features]`).
[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(feature, values("cargo-clippy"))'] }

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
# `macos-private-api` unlocks `transparent` windows on macOS — required so the
# popover webview is see-through and the NSVisualEffectView vibrancy (panel.rs)
# shows through. The `app.macOSPrivateApi` config flag also enables it, but making
# it explicit here guarantees the gate is on regardless of codegen. (Private API
# ⇒ not App Store eligible; loopy ships outside the store, so this is fine.)
tauri = { version = "2", features = ["tray-icon", "image-png", "macos-private-api"] }
tauri-plugin-positioner = { version = "2", features = ["tray-icon"] }
tauri-plugin-dialog = "2"
tauri-plugin-notification = "2"
# Open external URLs (the "About" window's GitHub/npm links) in the user's
# default browser. Official v2 successor to `shell.open`; access is locked down
# to the two loopy destinations via `opener:allow-open-url` (capabilities). Pinned
# to the current release confirmed against crates.io (C-0012, source-driven).
tauri-plugin-opener = "2.5.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# macOS-only: convert the tray popover into a non-activating NSPanel so it floats
# over fullscreen apps like a native menubar popover (see src/panel.rs). The CLI
# publish CI runs on Linux but never compiles this crate, so gating keeps it out.
[target.'cfg(target_os = "macos")'.dependencies]
tauri-nspanel = { git = "https://github.com/ahkohd/tauri-nspanel", branch = "v2" }
# Native NSVisualEffectView vibrancy for the tray popover, so the panel reads as a
# real macOS menubar surface (translucent, rounded) instead of a flat opaque box.
# Already vendored transitively; promoted to a direct dep so panel.rs can call
# apply_vibrancy(). Needs the popover window `transparent` (tauri.conf.json).
window-vibrancy = "0.6"
