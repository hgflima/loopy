name: publish

# Publica no npm quando voce cria um GitHub Release.
# Fluxo: bumpa a versao no package.json -> cria um Release (tag vX.Y.Z) -> esta esteira roda.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # necessario para o npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      # prepublishOnly ja roda o build (tsup) antes de empacotar.
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
