name: publish

# Publica no npm via Trusted Publishing (OIDC) quando voce cria um GitHub Release.
# Sem NPM_TOKEN: a autenticacao usa tokens efemeros via OIDC.
# Pre-requisito (uma vez): o primeiro publish do pacote e feito manualmente (local),
# e depois o Trusted Publisher e registrado na pagina do pacote no npmjs.com
# apontando para este repo + este arquivo de workflow (publish.yml).
#
# Fluxo: bumpa a versao -> cria um GitHub Release (tag vX.Y.Z) -> esta esteira roda.
# workflow_dispatch permite re-disparar o publish manualmente (ex.: recuperar de
# uma falha de infra do runner) sem recriar o Release.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # necessario para OIDC / provenance
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      # Trusted Publishing exige npm >= 11.5.1 — o Node 24 ja bundla acima disso
      # (24.18 = npm 11.16). NAO fazer `npm i -g npm@latest`: o upgrade in-place
      # corrompe a arvore global do npm ("removed N packages"), remove `sigstore`
      # e quebra a geracao de provenance no `npm publish` (Cannot find module
      # 'sigstore'). Usa-se o npm bundlado, que tem a arvore integra.
      - run: node --version && npm --version

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      # Sem NODE_AUTH_TOKEN: o OIDC autentica o publish. prepublishOnly roda o build.
      - run: npm publish
