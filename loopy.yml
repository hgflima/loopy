# loopy.yml — entrega da change C-0008 (multi-agente Codex+Claude) no PRÓPRIO repo (dogfooding).
#
# Bootstrapping: v0.1.7 ainda NÃO tem `agents:` (é o que esta change constrói), então este
# config usa o schema atual — single-agent (Claude Code via ACP). Otimizações pedidas:
#   • merge resiliente   → merge SEMÂNTICO por agente no worktree (reconcile-parent →
#                          resolve-merge → finalize-merge); o merge no root chega trivial.
#                          on_merge_conflict: escalate é só o backstop final.
#   • paralelismo        → concurrency: 3 (largura máxima do DAG do todo.md). Steps de Agente
#                          rodam fora do mutex por natureza (Sessão por-worktree); install-deps
#                          (npm ci lento) é parallel_safe; create-worktree/commit/merge/cleanup
#                          ficam na Seção crítica do parent (git rápido, serializado).
version: "1"
name: C-0008-multi-agent-codex

workspace:
  root: "."
  parent_branch: "main"
  worktrees_dir: ".worktrees"

acp:
  command: ["npx", "-y", "@agentclientprotocol/claude-agent-acp"]
  request_timeout_seconds: 1800
  permissions:
    default_mode: acceptEdits
    on_request: allow

inputs:
  spec: ".harn/devy/changes/C-0009-native-ui-menubar/spec.md"
  plan: ".harn/devy/changes/C-0009-native-ui-menubar/plan.md"
  todo: ".harn/devy/changes/C-0009-native-ui-menubar/todo.md"
  backlog:
    pending_marker: "- [ ]"
    done_marker: "- [x]"
    task_id_pattern: "T-\\d+"
    body: indented
    mark_done_on_success: true
    deps_pattern: "Deps:"

checks:
  ci:
    - { name: typecheck, run: "npm run typecheck" }
    - { name: lint, run: "npm run lint" }
    - { name: test, run: "npm test" }

pipeline:
  - id: create-worktree
    type: shell
    run:
      - git worktree add -b "${task.branch}" "${worktree.path}" "${workspace.parent_branch}"

  - id: install-deps
    type: shell
    parallel_safe: true
    run:
      - npm ci --prefix "${worktree.path}"

  - id: implement
    type: agent
    clear_context: true
    mode: acceptEdits
    prompt: |
      /devy:build Implemente a task ${task.id} — ${task.title} — conforme ${inputs.spec} e ${inputs.plan}.
      ${task.body}
      ${checks.report}
      **CRITICAL**: NÃO rode git add/commit. Deixe todas as mudanças no working tree; o pipeline faz o commit.
    retry_prompt: |
      A tentativa anterior está no worktree, mas os checks falharam. Leia o código e corrija.
      ${checks.report}
    verify: { run: ci, max_attempts: 3 }

  - id: simplify
    type: agent
    clear_context: true
    mode: acceptEdits
    prompt: |
      /devy:code-simplify Simplifique o que está no worktree sem alterar comportamento: remova
      duplicação, clareie nomes, reduza complexidade. Não adicione dependências.
      **CRITICAL**: NÃO rode git add/commit. Deixe todas as mudanças no working tree; o pipeline faz o commit.
      Diff atual:
      ${worktree.diff}
    verify: { run: ci, max_attempts: 3 }

  - id: review
    type: agent
    clear_context: true
    mode: default
    prompt: |
      /devy:review Reveja a implementação da task ${task.id} contra ${inputs.spec} e ${inputs.plan}
      **CRITICAL:** NUNCA EDITE NADA!
      Diff sob revisão:
      ${worktree.diff}
      Responda na ÚLTIMA linha exatamente "REVIEW: PASS" ou "REVIEW: FAIL: <motivo>".
    expect: "REVIEW: PASS"
    on_fail: { goto: implement }

  - id: commit
    type: shell
    run:
      # exclui .claude/ (harness commitado): impede que edições incidentais do harness
      # (ex.: silenciar lint de .claude/**) entrem no commit da task e conflitem no merge.
      - 'git -C "${worktree.path}" add -A -- . :!.claude'
      # --allow-empty: os agentes /devy:* podem auto-commitar; sem isso, árvore limpa → git commit exit 1.
      - 'git -C "${worktree.path}" commit --allow-empty -m "feat(${task.id}): ${task.title}"'

  # ---------------------------------------------------------------------------
  # Resiliência de merge (SEMÂNTICA, por agente).
  #
  # Um conflito acontece ao integrar os dois lados. Como um Step de Agente roda
  # SEMPRE no worktree da task (cwd imutável, keyed por (Agente, Worktree)), ele
  # NÃO enxerga um conflito deixado por `git merge` no parent (root). Por isso a
  # reconciliação é feita DENTRO do worktree — trazendo o parent para cá, onde o
  # agente pode resolver — e só então o merge no root vira trivial (fast-forward).
  #
  #   reconcile-parent  (shell)  integra o parent no worktree
  #     ├─ sem conflito → goto merge   (merge no root é limpo)
  #     └─ conflito     → goto resolve-merge
  #   resolve-merge     (agent)  resolve os markers SEMANTICAMENTE (não commita)
  #   finalize-merge    (shell)  conclui o merge do parent no worktree
  #   merge             (approval, root)  agora sempre trivial
  # ---------------------------------------------------------------------------
  - id: reconcile-parent
    type: shell
    # worktree-scoped: opera com -C no worktree, não muta o parent → fora do mutex.
    parallel_safe: true
    run:
      - git -C "${worktree.path}" merge --no-edit "${workspace.parent_branch}"
    on_success: { goto: merge } # já integrado (ou no-op) → merge no root é limpo
    on_fail: { goto: resolve-merge } # conflito → agente resolve semanticamente

  - id: resolve-merge
    type: agent
    clear_context: true
    mode: acceptEdits
    prompt: |
      Ao integrar ${workspace.parent_branch} no worktree desta task houve CONFLITO de merge
      (merge em progresso, arquivos com markers `<<<<<<<`/`=======`/`>>>>>>>`).

      Resolva SEMANTICAMENTE cada conflito: preserve a intenção dos DOIS lados — a mudança da
      task ${task.id} (${task.title}) E o que veio do parent — em vez de escolher um lado cegamente.
      Não altere comportamento fora das regiões conflitadas.

      Inspecione o estado com:
        git -C "${worktree.path}" status
        git -C "${worktree.path}" diff
      e edite os arquivos removendo TODOS os markers de conflito.

      **CRITICAL**: NÃO rode git add/commit/merge --continue/--abort. Apenas deixe os arquivos
      resolvidos no working tree; o pipeline finaliza o merge. Garanta os checks verdes.
    retry_prompt: |
      Ainda há conflito não resolvido ou os checks falharam após a resolução. Verifique
      `git -C "${worktree.path}" status` (não pode haver caminhos "Unmerged") e corrija.
      ${checks.report}
    verify: { run: ci, max_attempts: 3 }
    on_fail: escalate # 3 tentativas sem resolver → pausa com worktree preservado (humano assume)

  - id: finalize-merge
    type: shell
    run:
      - git -C "${worktree.path}" add -A -- . :!.claude
      # conclui o merge em progresso (não é commit vazio: um merge commit sempre tem 2 pais).
      - git -C "${worktree.path}" commit --no-edit

  - id: merge
    type: approval
    prompt: "Aprovar merge da task ${task.id} (${task.title}) em ${workspace.parent_branch}?"
    run:
      - 'git -C "${workspace.root}" merge --no-ff "${task.branch}" -m "merge(${task.id}): ${task.title}"'
    # on_fail = CONFLITO no root: o parent avançou (uma task-irmã merjou) DEPOIS do reconcile-parent,
    # que roda fora do mutex → o merge no root deixou de ser trivial. NÃO escalar sujo (foi o que
    # travou a run: T-018 conflitou e o merge pela metade contaminou T-014 com "unmerged files").
    # Aborta e re-reconcilia o main atual, retentando. Converge porque os merges são serializados;
    # max_step_visits é o backstop se a corrida não estabilizar.
    on_fail: { goto: abort-root-merge }

  - id: abort-root-merge
    type: shell
    # muta o root → NÃO parallel_safe (roda na Seção crítica do parent). Restaura o root limpo
    # após o merge conflitado, impedindo que o estado pela metade contamine tasks-irmãs.
    run:
      - git -C "${workspace.root}" merge --abort
    on_success: { goto: reconcile-parent } # re-integra o main atual no worktree e retenta o merge

  - id: cleanup
    type: shell
    always: true
    run:
      - git -C "${workspace.root}" worktree remove --force "${worktree.path}"
      - git -C "${workspace.root}" branch -D "${task.branch}"

stop_conditions:
  max_iterations: 25
  max_step_visits: 25
  stop_signal_file: ".loopy.stop"

# Largura máxima do DAG do todo.md é 3 (camada T-005/T-006/T-007). Tasks independentes com
# Deps: satisfeitas rodam em paralelo até este teto.
concurrency: 5

policies:
  escalation:
    action: pause
    keep_worktree: true
    notify: stderr
  git:
    require_clean_parent: true
    # escalate: a resiliência primária a conflito é o merge SEMÂNTICO (reconcile-parent →
    # resolve-merge) no worktree; o merge no root já chega trivial. Este é só o backstop final.
    on_merge_conflict: escalate

logging:
  dir: ".loopy/logs"
  per_task: true
  capture_acp_traffic: true

# Coleta opt-in de métricas (C-0005): tempo/tokens por Step + custo por Task (best-effort).
metrics:
  report:
    index: "${change.dir}/../index.md"   # .harn/devy/changes/index.md (Relatório de change)
