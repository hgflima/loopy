version: "1"
name: C-0011-agent-context-and-polish
workspace:
  root: .
  parent_branch: main
  worktrees_dir: .worktrees
agents:
  codex:
    preset: codex
    model: gpt-5.6-terra
    effort: xhigh
    display_name: codex
  claude:
    preset: claude
    model: opus[1m]
    effort: xhigh
    display_name: claude
  opencode:
    preset: opencode
acp:
  default_agent: claude
  request_timeout_seconds: 1800
  permissions:
    default_mode: acceptEdits
    on_request: allow
inputs:
  spec: .harn/devy/changes/C-0017-telemetry-and-change-insights/spec.md
  plan: .harn/devy/changes/C-0017-telemetry-and-change-insights/plan.md
  todo: .harn/devy/changes/C-0017-telemetry-and-change-insights/todo.md
  backlog:
    pending_marker: "- [ ]"
    done_marker: "- [x]"
    task_id_pattern: T-\d+
    deps_pattern: "Deps:"
    body: indented
    mark_done_on_success: true
checks:
  ci:
    - name: typecheck
      run: npm run typecheck
    - name: lint
      run: npm run lint
    - name: test-engine
      run: npm test
    - name: test-app
      run: npm test -w apps/menubar
    - name: build
      run: npm run build
pipeline:
  - id: create-worktree
    parallel_safe: false
    type: shell
    run:
      - git worktree add -b "${task.branch}" "${worktree.path}"
        "${workspace.parent_branch}"
  - id: install-deps
    parallel_safe: true
    type: shell
    run:
      - npm ci --prefix "${worktree.path}"
  - id: implement
    parallel_safe: false
    type: agent
    prompt: >
      /devy:build Implemente a task ${task.id} — ${task.title} — conforme
      ${inputs.spec} e ${inputs.plan}.

      ${task.body}

      ${checks.report}

      **CRITICAL**: NÃO rode git add/commit. Deixe todas as mudanças no working
      tree; o pipeline faz o commit.
    retry_prompt: >
      A tentativa anterior está no worktree, mas os checks falharam. Leia o
      código e corrija.

      ${checks.report}
    mode: acceptEdits
    clear_context: true
    verify:
      run: ci
      max_attempts: 3
    agent: claude
  - id: simplify
    parallel_safe: false
    type: agent
    prompt: >
      /devy:code-simplify Simplifique o que está no worktree sem alterar
      comportamento: remova

      duplicação, clareie nomes, reduza complexidade. Não adicione dependências.

      **CRITICAL**: NÃO rode git add/commit. Deixe todas as mudanças no working
      tree; o pipeline faz o commit.

      Diff atual:

      ${worktree.diff}
    mode: acceptEdits
    clear_context: true
    verify:
      run: ci
      max_attempts: 3
    agent: claude
  - id: review
    parallel_safe: false
    type: agent
    prompt: >
      /devy:review Reveja a implementação da task ${task.id} contra
      ${inputs.spec} e ${inputs.plan}

      **CRITICAL:** NUNCA EDITE NADA!

      Diff sob revisão:

      ${worktree.diff}

      Responda na ÚLTIMA linha exatamente "REVIEW: PASS" ou "REVIEW: FAIL:
      <motivo>".
    mode: acceptEdits
    clear_context: true
    expect: "REVIEW: PASS"
    on_fail:
      goto: implement
    agent: claude
  - id: commit
    parallel_safe: false
    type: shell
    run:
      - git -C "${worktree.path}" add -A -- . :!.claude
      - 'git -C "${worktree.path}" commit --allow-empty -m "feat(${task.id}):
        ${task.title}"'
  - id: reconcile-parent
    on_success:
      goto: merge
    parallel_safe: true
    type: shell
    run:
      - git -C "${worktree.path}" merge --no-edit "${workspace.parent_branch}"
    on_fail:
      goto: resolve-merge
  - id: resolve-merge
    parallel_safe: false
    type: agent
    prompt: >
      Ao integrar ${workspace.parent_branch} no worktree desta task houve
      CONFLITO de merge

      (merge em progresso, arquivos com markers `<<<<<<<`/`=======`/`>>>>>>>`).


      Resolva SEMANTICAMENTE cada conflito: preserve a intenção dos DOIS lados —
      a mudança da

      task ${task.id} (${task.title}) E o que veio do parent — em vez de
      escolher um lado cegamente.

      Não altere comportamento fora das regiões conflitadas.


      Inspecione o estado com:
        git -C "${worktree.path}" status
        git -C "${worktree.path}" diff
      e edite os arquivos removendo TODOS os markers de conflito.


      **CRITICAL**: NÃO rode git add/commit/merge --continue/--abort. Apenas
      deixe os arquivos

      resolvidos no working tree; o pipeline finaliza o merge. Garanta os checks
      verdes.
    retry_prompt: >
      Ainda há conflito não resolvido ou os checks falharam após a resolução.
      Verifique

      `git -C "${worktree.path}" status` (não pode haver caminhos "Unmerged") e
      corrija.

      ${checks.report}
    mode: acceptEdits
    clear_context: true
    verify:
      run: ci
      max_attempts: 3
    on_fail: escalate
  - id: finalize-merge
    parallel_safe: false
    type: shell
    run:
      - git -C "${worktree.path}" add -A -- . :!.claude
      - git -C "${worktree.path}" commit --no-edit
  - id: merge
    on_success:
      goto: cleanup
    parallel_safe: false
    type: approval
    prompt: Aprovar merge da task ${task.id} (${task.title}) em
      ${workspace.parent_branch}?
    run:
      - 'git -C "${workspace.root}" merge --no-ff "${task.branch}" -m
        "merge(${task.id}): ${task.title}"'
    on_fail:
      goto: abort-root-merge
  - id: abort-root-merge
    on_success:
      goto: reconcile-parent
    parallel_safe: false
    type: shell
    run:
      - git -C "${workspace.root}" merge --abort
  - id: cleanup
    always: true
    parallel_safe: false
    type: shell
    run:
      - bash "${workspace.root}/scripts/cleanup-worktree.sh" "${workspace.root}"
        "${worktree.path}" "${task.branch}"
stop_conditions:
  max_iterations: 25
  max_step_visits: 25
  stop_signal_file: .loopy.stop
concurrency: auto
max_concurrency: 6
policies:
  escalation:
    action: pause
    keep_worktree: true
    notify: stderr
  git:
    require_clean_parent: true
    on_merge_conflict: escalate
logging:
  dir: .loopy/logs
  per_task: true
  capture_acp_traffic: true
metrics:
  report:
    index: ${change.dir}/../index.md
